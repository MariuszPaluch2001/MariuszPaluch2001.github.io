<!doctype html>
<html lang="en">
<head>
<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
    }
    .topnav {
        overflow: hidden;
        background-color: #333;
    }

    .topnav a {
        float: left;
        color: #f2f2f2;
        text-align: center;
        padding:  14px 16px;
        text-decoration: none;
        font-size: 17px;
    }

    .topnav a:hover {
        background-color: #04AA6D;
        color: white;
    }
    .topnav a.active{
        background-color: #04AA6D;
        color: white;
    }
    body{ 
        height:100vh; 
        margin:0; 
        display:flex; 
        flex-direction:column; 
    }

    header{ 
        min-height:50px; 
        background:white; 
        pointer-events: none;
        text-align: center;
        padding:  14px;
        font-size: 30px;
    }


    footer{
        display:flex;
        background-color: #04AA6D;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        min-height:50px;
        justify-content:center;
        align-items:center;
        pointer-events: none;
    }
    article{
        pointer-events: none;
    }


    .center {
        display: block;
        margin-left: auto;
        margin-right: auto;
    }   
</style>
</head>
<body>
    <!-- Navbar -->
    <div class="topnav">
        <a class="active" href="#home">Home</a>
        <a href="#contact">Contact</a>
        <a href="#about">About me</a>
    </div>

    <header contentEditable>Hello world!</header>
    
    <div style="background-size: cover; height:480px; padding-top: 80px; text-align: center;">
        <img src="src/github-logo.png" width="256px" height="256px">
        <h1 style="font-size:50px; color:black; margin:10px;">Powered by github</h1>
      </div>
    <footer contentEditable>Mariusz Paluch &#169 2022</footer>

</body>
</html>
